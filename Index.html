<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Incrémental - Cahier d'Étude</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .container {
            text-align: center;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .ressources {
            margin-bottom: 20px;
        }

        .production {
            margin-bottom: 10px;
            font-style: italic;
        }

        .achats {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .achat-item {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ressources">
            <p>Bons points : <span id="bonsPoints">0</span></p>
            <p class="production">Bons points par seconde (total) : <span id="totalBps">0</span></p>
            <p class="production">Bons points par seconde (élèves) : <span id="elevesBps">0</span></p>
            <p class="production">Bons points par seconde (classes) : <span id="classesBps">0</span></p>
            <p>Images : <span id="images">0</span></p>
            <p>Professeurs : <span id="professeurs">0</span></p>
        </div>

        <button id="etudierButton">Étudier sagement (+1 bon point)</button>

        <div class="achats">
            <h2>Achats</h2>
            <div id="achatEleveSection">
                <button id="acheterEleveButton">Acheter un élève (coût : 10 bons points)</button>
                <p>Nombre d'élèves : <span id="nombreEleves">0</span></p>
            </div>
            <div id="achatClasseSection">
                <button id="acheterClasseButton">Acheter une salle de classe (coût : 30 élèves)</button>
                <p>Nombre de salles de classe : <span id="nombreClasses">0</span></p>
            </div>
            <div id="achatImageSection">
                <button id="acheterImageButton">Acheter une image (coût : 1000 bons points)</button>
            </div>
            <div id="achatProfesseurSection" style="display: none;">
                <button id="acheterProfesseurButton">Acheter un professeur (coût : 2 images)</button>
            </div>
        </div>
    </div>

    <script>
        let bonsPoints = 0;
        let bonsPointsParSecondeEleves = 0;
        let bonsPointsParSecondeClasses = 0;
        let totalBonsPointsParSeconde = 0;
        let nombreEleves = 0;
        let coutEleveBase = 10;
        let coutEleveActuel = coutEleveBase;
        let nombreClasses = 0;
        let images = 0;
        let nombreProfesseurs = 0;
        let multiplicateurProfesseur = 1;

        const bonsPointsSpan = document.getElementById('bonsPoints');
        const totalBpsSpan = document.getElementById('totalBps');
        const elevesBpsSpan = document.getElementById('elevesBps');
        const classesBpsSpan = document.getElementById('classesBps');
        const nombreElevesSpan = document.getElementById('nombreEleves');
        const nombreClassesSpan = document.getElementById('nombreClasses');
        const imagesSpan = document.getElementById('images');
        const professeursSpan = document.getElementById('professeurs');
        const etudierButton = document.getElementById('etudierButton');
        const acheterEleveButton = document.getElementById('acheterEleveButton');
        const acheterClasseButton = document.getElementById('acheterClasseButton');
        const acheterImageButton = document.getElementById('acheterImageButton');
        const acheterProfesseurButton = document.getElementById('acheterProfesseurButton');
        const achatProfesseurSection = document.getElementById('achatProfesseurSection');

        etudierButton.addEventListener('click', () => {
            bonsPoints++;
            mettreAJourAffichageBonsPoints();
        });

        acheterEleveButton.addEventListener('click', () => {
            if (bonsPoints >= coutEleveActuel) {
                bonsPoints -= coutEleveActuel;
                nombreEleves++;
                bonsPointsParSecondeEleves = nombreEleves * 0.5;
                mettreAJourAffichage();
                coutEleveActuel = coutEleveBase * (nombreClasses + 1);
                acheterEleveButton.textContent = `Acheter un élève (coût : ${coutEleveActuel} bons points)`;
            } else {
                alert("Pas assez de bons points !");
            }
        });

        acheterClasseButton.addEventListener('click', () => {
            if (nombreEleves >= 30) {
                nombreEleves -= 30;
                nombreClasses++;
                bonsPointsParSecondeEleves = nombreEleves * 0.5; // Recalculer le BPS des élèves restants
                bonsPointsParSecondeClasses = nombreClasses * 25 * multiplicateurProfesseur;
                coutEleveActuel = coutEleveBase * nombreClasses; // Le prix de l'élève augmente avec le nombre de classes
                acheterEleveButton.textContent = `Acheter un élève (coût : ${coutEleveActuel} bons points)`;
                mettreAJourAffichage();
            } else {
                alert("Pas assez d'élèves pour acheter une salle de classe !");
            }
        });

        acheterImageButton.addEventListener('click', () => {
            if (bonsPoints >= 1000) {
                bonsPoints -= 1000;
                images++;
                imagesSpan.textContent = images;
                mettreAJourAffichageBonsPoints();
                verifierDeblocageProfesseur();
            } else {
                alert("Pas assez de bons points pour acheter une image !");
            }
        });

        function verifierDeblocageProfesseur() {
            if (images >= 2) {
                achatProfesseurSection.style.display = 'block';
            }
        }

        acheterProfesseurButton.addEventListener('click', () => {
            if (images >= 2) {
                images -= 2;
                nombreProfesseurs++;
                multiplicateurProfesseur = 1 + (0.25 * nombreProfesseurs); // Exemple d'un bonus de 25% par professeur
                bonsPointsParSecondeClasses = nombreClasses * 25 * multiplicateurProfesseur;
                professeursSpan.textContent = nombreProfesseurs;
                imagesSpan.textContent = images;
                mettreAJourAffichage();
            } else {
                alert("Pas assez d'images pour acheter un professeur !");
            }
        });

        function mettreAJourAffichage() {
            totalBonsPointsParSeconde = bonsPointsParSecondeEleves + bonsPointsParSecondeClasses;
            bonsPointsSpan.textContent = Math.floor(bonsPoints); // Afficher l'entier
            totalBpsSpan.textContent = totalBonsPointsParSeconde.toFixed(1);
            elevesBpsSpan.textContent = bonsPointsParSecondeEleves.toFixed(1);
            classesBpsSpan.textContent = bonsPointsParSecondeClasses.toFixed(1);
            nombreElevesSpan.textContent = nombreEleves;
            nombreClassesSpan.textContent = nombreClasses;
            professeursSpan.textContent = nombreProfesseurs;
        }

        function mettreAJourAffichageBonsPoints() {
            bonsPointsSpan.textContent = Math.floor(bonsPoints);
        }

        setInterval(() => {
            bonsPoints += totalBonsPointsParSeconde;
            mettreAJourAffichageBonsPoints();
        }, 1000);

        // Initialisation de l'affichage
        mettreAJourAffichage();
    </script>
</body>
</html>
